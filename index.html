<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>NearPop Merchant — Bulk Upload</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  body { font-family: 'Nunito', sans-serif; background: #0F0F13; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
  .card { background: #1E293B; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); max-width: 500px; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
  h1 { color: #FF5722; font-weight: 900; margin-top: 0; }
  .btn { background: #FF5722; color: #fff; border: none; padding: 14px 24px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.2s; font-family: inherit; width: 100%; margin-top: 20px; }
  .btn:active { transform: scale(0.95); }
  .btn:disabled { background: #475569; cursor: not-allowed; }
  .hidden { display: none; }
  .console { background: #000; color: #10B981; padding: 16px; border-radius: 12px; text-align: left; font-family: monospace; font-size: 12px; margin-top: 20px; height: 150px; overflow-y: auto; }
</style>
</head>
<body>

<div class="card" id="login-screen">
  <img src="https://nearpop.in/icons/logo.png" style="height: 100px; width: auto; object-fit: contain; margin-bottom: 20px;" />
  <p style="color: #94A3B8; margin-bottom: 30px;">Enterprise Bulk Listing Importer</p>
  <button class="btn" id="login-btn">Secure Merchant Login</button>
  <div id="login-status" style="margin-top: 15px; color: #EF4444; font-size: 14px;"></div>
</div>

<div class="card hidden" id="upload-screen">
  <h1>Upload Listings</h1>
  <p style="color: #94A3B8; font-size: 13px;">Format required: title, desc, price, type, lat, lng</p>
  
  <input type="file" id="csv-file" accept=".csv" style="margin: 20px 0; background: #0F0F13; padding: 10px; border-radius: 8px; width: 100%;">
  
  <button class="btn" id="upload-btn">Start Bulk Import</button>
  
  <div class="console" id="console-log">Awaiting CSV file...<br></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
// 🚀 ADDED: Timestamp import
import { getFirestore, doc, getDoc, collection, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDYUm3VV8iuLHQKJuU9fWgaRaYU0t5Dlzk",
    authDomain: "nearpop-a432d.firebaseapp.com",
    projectId: "nearpop-a432d",
    storageBucket: "nearpop-a432d.firebasestorage.app",
    messagingSenderId: "265333242320",
    appId: "1:265333242320:web:f2cedec620ef08d4e161d5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUid = null;
let currentMerchantName = "NearPop Merchant"; // 🚀 ADDED: Store merchant name

// 2. THE GEOHASH MATH ENGINE (No live GPS required)
const B32 = "0123456789bcdefghjkmnpqrstuvwxyz";
function encodeGeoHash(lat, lng, precision = 5) {
  let isEven = true; let latR = [-90, 90], lngR = [-180, 180];
  let bit = 0, ch = 0, hash = "";
  while (hash.length < precision) {
    let mid;
    if (isEven) {
      mid = (lngR[0] + lngR[1]) / 2;
      if (lng > mid) { ch |= (1 << (4 - bit)); lngR[0] = mid; } else { lngR[1] = mid; }
    } else {
      mid = (latR[0] + latR[1]) / 2;
      if (lat > mid) { ch |= (1 << (4 - bit)); latR[0] = mid; } else { latR[1] = mid; }
    }
    isEven = !isEven;
    if (bit < 4) { bit++; } else { hash += B32[ch]; bit = 0; ch = 0; }
  }
  return hash;
}

// 3. LOGGER HELPER
function logMsg(msg) {
  const con = document.getElementById('console-log');
  con.innerHTML += msg + "<br>";
  con.scrollTop = con.scrollHeight;
}

// 4. AUTHENTICATION (The Gatekeeper)
document.getElementById('login-btn').addEventListener('click', async () => {
  const status = document.getElementById('login-status');
  status.textContent = "Connecting to Firebase...";
  
  try {
    const result = await signInWithPopup(auth, provider);
    const uid = result.user.uid;
    
    // Verify they are a registered Merchant
    const userSnap = await getDoc(doc(db, 'users', uid));
    if (!userSnap.exists() || userSnap.data().role !== 'merchant') {
      await auth.signOut();
      status.textContent = "Access Denied: You must be a registered Merchant.";
      return;
    }
    
    currentUid = uid;
    // 🚀 ADDED: Save their actual business name for the deals
    currentMerchantName = userSnap.data().mname || "NearPop Merchant";
    
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('upload-screen').classList.remove('hidden');
    logMsg("✅ Authenticated as Merchant: " + currentMerchantName);
    
  } catch (error) {
    status.textContent = "Login failed.";
    console.error(error);
  }
});

// 5. CSV PARSING & UPLOAD
document.getElementById('upload-btn').addEventListener('click', () => {
  const fileInput = document.getElementById('csv-file');
  if (!fileInput.files.length) return logMsg("❌ Please select a CSV file first.");
  
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.textContent = "Uploading...";
  
  Papa.parse(fileInput.files[0], {
    header: true,
    skipEmptyLines: true,
    complete: async function(results) {
      const rows = results.data;
      logMsg(`Found ${rows.length} deals. Starting upload...`);
      
      let successCount = 0;
      
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        try {
          const lat = parseFloat(row.lat);
          const lng = parseFloat(row.lng);
          
          if (isNaN(lat) || isNaN(lng)) {
            logMsg(`⚠️ Skipped Row ${i+1}: Invalid coordinates.`);
            continue;
          }

          // 🚀 ADDED: Generate BOTH Geohashes
          const hash5 = encodeGeoHash(lat, lng, 5);
          const hash6 = encodeGeoHash(lat, lng, 6);

          // 🚀 FULLY UPDATED PAYLOAD: Matches the manual app creation exactly
          const dealData = {
            uid: currentUid,
            title: row.title || "Special Offer",
            desc: row.desc || "",
            price: row.price || "",
            type: row.type || "deal",
            lat: lat,
            lng: lng,
            geohash5: hash5,
            geohash6: hash6,
            status: "active",
            budget: 100,
            dailyPopupLimit: 1000,
            radius: 500,
            
            // UI Defaults
            emoji: "🏷️",
            bg: "linear-gradient(135deg,#f7971e,#ffd200)",
            color: "#FF5722",
            owner: currentMerchantName,
            ownerEmoji: "🏪",
            ownerTag: "NearPop Merchant",
            image: "",
            priceLabel: "",
            contact: "",
            verified: true,
            expiryDate: null,
            startDate: new Date().toISOString().split('T')[0],
            
            // Analytics Baseline
            popups: 0,
            visits: 0,
            claims: 0,
            redemptions: 0,
            popupsSentToday: 0,
            
            // Correct Timestamp Object
            createdAt: Timestamp.now()
          };

          await addDoc(collection(db, 'listings'), dealData);
          successCount++;
          logMsg(`✅ Uploaded: ${dealData.title}`);
          
        } catch (err) {
          logMsg(`❌ Failed Row ${i+1}: ${err.message}`);
        }
      }
      
      logMsg(`🎉 Import Complete! ${successCount} deals pushed to live map.`);
      btn.textContent = "Upload Complete";
    }
  });
});
</script>
</body>
</html>
